<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0d14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="POCUS">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="Point-of-Care Ultrasound 기록 및 자동 판독 보조">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>POCUS Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0d14;
    --bg2: #0f1520;
    --bg3: #141c2e;
    --card: #161f33;
    --border: #1e2d4a;
    --border2: #253652;
    --accent: #00d4ff;
    --accent2: #0099bb;
    --green: #00e676;
    --red: #ff3d5a;
    --yellow: #ffd740;
    --orange: #ff6b35;
    --purple: #bb86fc;
    --text: #e0eaff;
    --text2: #8899bb;
    --text3: #4a5a7a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 200;
    background: rgba(10,13,20,0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title {
    font-family: var(--mono); font-size: 16px; font-weight: 700;
    color: var(--accent); letter-spacing: 0.1em;
  }
  .header-title::before { content: '⚡'; margin-right: 6px; font-size: 13px; }
  .header-subtitle { font-size: 10px; color: var(--text3); font-family: var(--mono); letter-spacing: 0.15em; }

  /* ── CONTAINER ── */
  .container { position: relative; z-index: 1; padding: 12px; max-width: 600px; margin: 0 auto; }

  /* ── SECTION ── */
  .section {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .section:focus-within { border-color: var(--border2); }

  .section-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px;
    background: rgba(0,212,255,0.04);
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .section-icon { font-size: 14px; width: 20px; text-align: center; }
  .section-title {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; flex: 1;
  }
  .section-toggle { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
  .section-toggle.open { transform: rotate(180deg); }

  .section-body { padding: 12px 14px; }
  .section-body.collapsed { display: none; }

  /* ── GRID ── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

  /* ── FIELD ── */
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-family: var(--mono); font-size: 9px; font-weight: 500;
    letter-spacing: 0.15em; color: var(--text3); text-transform: uppercase;
    display: flex; align-items: center; gap: 4px;
  }
  .field-label .unit { color: var(--text3); font-size: 8px; }

  input[type="number"], input[type="text"] {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 14px;
    padding: 8px 10px; width: 100%; outline: none;
    transition: border-color 0.15s, background 0.15s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type="number"]:focus, input[type="text"]:focus {
    border-color: var(--accent2); background: var(--bg3);
  }
  input.abnormal {
    color: var(--red); border-color: rgba(255,61,90,0.4);
    background: rgba(255,61,90,0.05);
  }

  /* ── TOGGLE BUTTONS ── */
  .toggle-group { display: flex; gap: 4px; }
  .toggle-btn {
    flex: 1; padding: 8px 4px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); color: var(--text2);
    font-family: var(--mono); font-size: 11px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .toggle-btn:hover { border-color: var(--border2); }
  .toggle-btn.active-neg { background: rgba(0,230,118,0.12); border-color: rgba(0,230,118,0.4); color: var(--green); }
  .toggle-btn.active-pos { background: rgba(255,61,90,0.12); border-color: rgba(255,61,90,0.4); color: var(--red); }
  .toggle-btn.active-a   { background: rgba(0,212,255,0.10); border-color: rgba(0,212,255,0.3); color: var(--accent); }
  .toggle-btn.active-b   { background: rgba(255,215,64,0.10); border-color: rgba(255,215,64,0.3); color: var(--yellow); }
  .toggle-btn.active-ns  { background: rgba(255,107,53,0.10); border-color: rgba(255,107,53,0.3); color: var(--orange); }

  /* ── LUNG ── */
  .lung-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .lung-side-label { font-family: var(--mono); font-size: 10px; font-weight: 700; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.1em; }
  .lung-zones { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .zone-item { display: flex; flex-direction: column; gap: 2px; }
  .zone-label { font-family: var(--mono); font-size: 8px; letter-spacing: 0.08em; color: var(--text3); text-align: center; }

  /* ── RWMA SVG DIAGRAM ── */
  .rwma-tabs {
    display: flex; gap: 4px; margin-bottom: 8px;
  }
  .rwma-tab {
    flex: 1; padding: 7px 4px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg2); color: var(--text3);
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .rwma-tab.active {
    background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.35); color: var(--accent);
  }
  .rwma-view-label {
    font-family: var(--mono); font-size: 9px; color: var(--text3);
    letter-spacing: 0.1em; margin-bottom: 8px; text-align: center;
  }
  .rwma-diagram-wrap {
    display: flex; justify-content: center; margin-bottom: 10px;
  }
  .rwma-svg {
    width: 100%; max-width: 280px; height: auto;
    display: block;
  }

  /* Segment path states */
  .seg-path {
    cursor: pointer;
    fill: #111827;
    stroke: #1e2d4a;
    stroke-width: 1.5;
    transition: fill 0.15s, stroke 0.15s;
  }
  .seg-path:hover { stroke: #4a6a9a; stroke-width: 2; }
  .seg-path.state-norm { fill: #0d2018; stroke: #1a4030; }
  .seg-path.state-hypo { fill: #2a2000; stroke: #6a5000; }
  .seg-path.state-ak   { fill: #2a0810; stroke: #8a1828; }

  .seg-lbl {
    font-family: 'JetBrains Mono', monospace;
    font-size: 7.5px; fill: #4a5a7a;
    pointer-events: none; user-select: none;
  }

  /* Legend */
  .rwma-legend {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; background: var(--bg2); border-radius: 6px;
    border: 1px solid var(--border); margin-bottom: 6px;
  }
  .rwma-leg-item {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 9px; color: var(--text3);
  }
  .rwma-leg-dot {
    width: 10px; height: 10px; border-radius: 2px;
    border: 1px solid transparent; display: inline-block; flex-shrink: 0;
  }

  /* Territory key */
  .rwma-territory-key {
    display: flex; gap: 10px; margin-bottom: 8px;
    padding: 0 2px;
  }
  .rwma-terr {
    display: flex; align-items: center; gap: 4px;
    font-family: var(--mono); font-size: 9px; color: var(--text3);
  }
  .rwma-terr-dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }

  /* Summary table */
  .rwma-summary {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden;
  }
  .rwma-sum-row {
    display: flex; align-items: center; gap: 0;
    padding: 5px 10px; border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .rwma-sum-row:last-child { border-bottom: none; }
  .rwma-sum-row.has-finding { background: rgba(255,61,90,0.04); }
  .rwma-sum-seg {
    font-family: var(--mono); font-size: 10px; color: var(--text2); flex: 1;
  }
  .rwma-sum-vessel {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em; width: 32px; text-align: center;
  }
  .lad-c { color: var(--red); }
  .rca-c { color: var(--orange); }
  .lcx-c { color: var(--purple); }
  .rwma-sum-val {
    font-family: var(--mono); font-size: 10px; color: var(--text3);
    width: 80px; text-align: right;
  }
  .rwma-sum-val.val-hypo { color: var(--yellow); font-weight: 700; }
  .rwma-sum-val.val-ak   { color: var(--red);    font-weight: 700; }

  /* ── IMPRESSION ── */
  .impression-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .badge {
    padding: 3px 9px; border-radius: 20px;
    font-family: var(--mono); font-size: 10px; font-weight: 700;
    letter-spacing: 0.08em; animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }

  .badge-cardiogenic { background: rgba(255,61,90,0.15); border: 1px solid rgba(255,61,90,0.4); color: var(--red); }
  .badge-hypovolemic { background: rgba(255,215,64,0.12); border: 1px solid rgba(255,215,64,0.4); color: var(--yellow); }
  .badge-pe          { background: rgba(255,107,53,0.12); border: 1px solid rgba(255,107,53,0.4); color: var(--orange); }
  .badge-ptx         { background: rgba(0,212,255,0.10); border: 1px solid rgba(0,212,255,0.30); color: var(--accent); }
  .badge-tamponade   { background: rgba(0,230,118,0.10); border: 1px solid rgba(0,230,118,0.30); color: var(--green); }
  .badge-rwma        { background: rgba(187,134,252,0.12); border: 1px solid rgba(187,134,252,0.35); color: var(--purple); }
  .badge-normal      { background: rgba(0,230,118,0.07); border: 1px solid rgba(0,230,118,0.18); color: var(--green); }

  textarea {
    width: 100%; background: var(--bg2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 12px;
    padding: 10px; resize: vertical; min-height: 78px;
    outline: none; line-height: 1.6; transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent2); }

  /* ── IVC STATUS TAG ── */
  .ivc-status-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px;
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    letter-spacing: 0.1em; margin-top: 4px;
    transition: all 0.2s;
  }
  .ivc-status-tag.plethora { background: rgba(255,61,90,0.12); border: 1px solid rgba(255,61,90,0.35); color: var(--red); }
  .ivc-status-tag.normal   { background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2); color: var(--green); }
  .ivc-status-tag.incomplete { background: rgba(74,90,122,0.15); border: 1px solid var(--border); color: var(--text3); }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 10px 0; }

  /* ── DVT ── */
  .dvt-side-label {
    font-family: var(--mono); font-size: 9px; font-weight: 700;
    letter-spacing: 0.15em; color: var(--text2); margin-bottom: 6px;
    text-transform: uppercase; display: flex; align-items: center; gap: 6px;
  }
  .dvt-side-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── BUTTONS ── */
  .guide-btn {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 4px;
    border: 1px solid var(--border2); background: transparent;
    color: var(--accent); font-family: var(--mono);
    font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0;
  }
  .guide-btn:hover { background: rgba(0,212,255,0.08); }

  /* ── TOOLTIP '?' ── */
  .tip-btn {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 4px;
    border: 1px solid rgba(0,212,255,.22); background: rgba(0,212,255,.05);
    color: var(--accent); font-family: var(--mono);
    font-size: 8px; font-weight: 700; letter-spacing: .08em;
    cursor: pointer; transition: all 0.15s; flex-shrink: 0; line-height: 1.4;
